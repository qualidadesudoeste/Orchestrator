services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: orchestrator
      MYSQL_USER: orchestrator
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Defina MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Defina MYSQL_ROOT_PASSWORD}
      TZ: ${TZ:-America/Sao_Paulo}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - orchestrator_mysql_prod:/var/lib/mysql
    networks:
      - internal

  migrate:
    build:
      context: .
      target: runtime
    image: orchestrator-platform:${APP_VERSION:-local}
    command: ["node", "dist/migrate.js"]
    env_file:
      - ${PRODUCTION_ENV_FILE:-.env.production}
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"
    networks:
      - internal

  app:
    image: orchestrator-platform:${APP_VERSION:-local}
    restart: unless-stopped
    env_file:
      - ${PRODUCTION_ENV_FILE:-.env.production}
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_BIND_ADDRESS:-127.0.0.1}:${APP_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - orchestrator_artifacts:/app/artifacts
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - internal

networks:
  internal:

volumes:
  orchestrator_mysql_prod:
  orchestrator_artifacts:
