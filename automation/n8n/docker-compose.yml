services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:2.31.4
    container_name: orchestrator_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_SECURE_COOKIE: "false"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_UNVERIFIED_PACKAGES_ENABLED: "true"
      N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE: "true"
      # Necessário para as expressões $env dos endpoints internos.
      # Mantenha a edição de workflows restrita a administradores confiáveis.
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      QA_AGENT_API_TOKEN: ${QA_AGENT_API_TOKEN}
      ORCHESTRATOR_API_URL: ${ORCHESTRATOR_API_URL}
      NON_FUNCTIONAL_RUNNER_URL: ${NON_FUNCTIONAL_RUNNER_URL:-http://host.docker.internal:8940}
      NON_FUNCTIONAL_RUNNER_TOKEN: ${QA_AGENT_API_TOKEN}
      GENERIC_TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
    external: true
